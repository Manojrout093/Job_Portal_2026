<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Portal Application</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ================= HEADER ================= -->
    <header>
        <h1>Job Finder Portal</h1>
        <p>Your Gateway to Careers</p>

        <nav>
            <a href="#">Home</a>
            <a href="#">Jobs</a>
            <a href="#">Companies</a>
            <a href="#">Post Job</a>
            <a href="#">Login</a>
        </nav>
    </header>

    <!-- ================= MAIN CONTENT ================= -->
    <main>

        <!-- ======== SEARCH SECTION ======== -->
        <section class="search-section">
            <h2>Search Jobs</h2>

            <form id="searchForm">

                <div class="form-group">
                    <label>Job Title</label>
                    <input type="text" id="searchTitle" placeholder="Enter job title">
                </div>

                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="searchLocation" placeholder="Enter location">
                </div>

                <div class="form-group">
                    <label>Company</label>
                    <input type="text" id="searchCompany" placeholder="Enter company name">
                </div>

                <div class="form-group">
                    <label>Experience</label>
                    <select id="searchExperience">
                        <option value="">Select</option>
                        <option value="Fresher">Fresher</option>
                        <option value="1-3 Years">1-3 Years</option>
                        <option value="3-5 Years">3-5 Years</option>
                        <option value="5+ Years">5+ Years</option>
                    </select>
                </div>

                <div class="form-group">
                    <button type="submit">Search</button>
                </div>

            </form>
        </section>

        <hr>

        <!-- ======== JOB LIST SECTION ======== -->
        <section class="jobs-section">
            <h2>Available Jobs</h2>
            <div id="jobContainer"></div>
        </section>

    </main>

    <!-- ======== POST JOB SECTION ======== -->
<section class="post-section">
    <h2>Post a Job</h2>

    <form id="postJobForm">

        <div class="form-group">
            <label>Job Title</label>
            <input type="text" id="jobTitle" required>
        </div>

        <div class="form-group">
            <label>Company</label>
            <input type="text" id="jobCompany" required>
        </div>

        <div class="form-group">
            <label>Location</label>
            <input type="text" id="jobLocation" required>
        </div>

        <div class="form-group">
            <label>Experience</label>
            <select id="jobExperience" required>
                <option value="">Select</option>
                <option>Fresher</option>
                <option>1-3 Years</option>
                <option>3-5 Years</option>
                <option>5+ Years</option>
            </select>
        </div>

        <div class="form-group">
            <button type="submit">Post Job</button>
        </div>

    </form>
</section>

<hr>

    <!-- ================= FOOTER ================= -->
    <footer>
        <p>© 2026 Job Finder Portal | All Rights Reserved</p>
    </footer>

    <!-- External JS -->
    <script src="script.js"></script>

</body>
</html>
